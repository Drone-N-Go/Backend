services:
  - type: web
    name: dronengo-api
    runtime: python
    rootDir: API
    buildCommand: pip install -r requirements.txt
    startCommand: bash scripts/start.sh
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
